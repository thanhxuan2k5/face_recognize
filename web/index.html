<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Recognition AI — Camera Dashboard</title>
  <meta name="description" content="Hệ thống nhận diện khuôn mặt real-time với AI pipeline, quản lý người và live camera stream." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0a0e1a;
      --surface:  #111827;
      --surface2: #1a2235;
      --border:   #1e2d45;
      --accent:   #6366f1;
      --accent2:  #22d3ee;
      --green:    #10b981;
      --red:      #ef4444;
      --orange:   #f59e0b;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   12px;
      --shadow:   0 4px 32px rgba(0,0,0,0.4);
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }
    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Layout ── */
    .app-shell {
      display: grid;
      grid-template-rows: 60px 1fr;
      grid-template-columns: 1fr;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      grid-column: 1/-1;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px);
    }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
    header h1 span { color: var(--accent2); }

    .badge {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 600;
      background: rgba(16,185,129,0.12); color: var(--green);
      border: 1px solid rgba(16,185,129,0.3);
    }
    .badge.offline { background: rgba(239,68,68,0.12); color: var(--red); border-color: rgba(239,68,68,0.3); }
    .badge .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: currentColor;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* ── Main Grid ── */
    main {
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: 1fr auto;
      gap: 0;
      overflow: hidden;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
    }

    /* ── Video Panel ── */
    .video-panel {
      position: relative;
      background: #000;
      overflow: hidden;
      min-height: 300px;
    }
    .video-panel img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }
    .video-overlay {
      position: absolute; top: 12px; left: 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .video-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 9px; font-size: 0.7rem; font-weight: 600;
      color: var(--accent2); white-space: nowrap;
    }
    .face-count-chip { color: var(--green); }
    .video-no-cam {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #000; color: var(--muted); gap: 12px;
    }
    .video-no-cam svg { width: 56px; opacity: 0.3; }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* Tab bar */
    .tab-bar {
      display: flex; border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1; padding: 14px 8px;
      background: transparent; border: none;
      color: var(--muted); font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* Tab content */
    .tab-pane { display: none; flex: 1; overflow-y: auto; padding: 16px; flex-direction: column; gap: 12px; }
    .tab-pane.active { display: flex; }

    /* ── Face Recognition Results ── */
    .face-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display: flex; align-items: center; gap: 12px;
      animation: fadeIn 0.25s ease;
      transition: border-color 0.2s;
    }
    .face-card:hover { border-color: var(--accent); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

    .face-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--border); display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0; overflow: hidden;
    }
    .face-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .face-info { flex: 1; min-width: 0; }
    .face-name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .face-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .face-sim { font-size: 0.72rem; font-weight: 600; }

    .liveness-badge {
      padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 700;
      flex-shrink: 0;
    }
    .liveness-badge.real { background: rgba(16,185,129,0.15); color: var(--green); }
    .liveness-badge.fake { background: rgba(239,68,68,0.15); color: var(--red); }

    .no-faces {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; gap: 10px; color: var(--muted); padding: 30px 0;
    }
    .no-faces svg { width: 48px; opacity: 0.25; }

    /* ── People List ── */
    .search-bar {
      display: flex; gap: 8px; margin-bottom: 4px;
    }
    .search-bar input {
      flex: 1; padding: 8px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.8rem;
      outline: none; transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--muted); }

    .person-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s;
    }
    .person-item:hover { border-color: var(--accent); transform: translateX(2px); }
    .person-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem; flex-shrink: 0; overflow: hidden;
    }
    .person-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .person-info { flex: 1; min-width: 0; }
    .person-name { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .person-sub { font-size: 0.7rem; color: var(--muted); }
    .person-actions { display: flex; gap: 4px; }
    .btn-icon {
      width: 28px; height: 28px; border-radius: 6px; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; font-size: 13px;
    }
    .btn-icon.del { background: rgba(239,68,68,0.12); color: var(--red); }
    .btn-icon.del:hover { background: rgba(239,68,68,0.25); }

    /* ── Add Person Form ── */
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-label { font-size: 0.75rem; color: var(--muted); font-weight: 500; }
    .form-input, .form-select {
      padding: 8px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.82rem;
      outline: none; transition: border-color 0.2s; width: 100%;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }
    .form-select option { background: var(--surface2); }

    .drop-zone {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 20px; text-align: center; cursor: pointer;
      transition: all 0.2s; color: var(--muted); font-size: 0.8rem;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); color: var(--accent); }
    .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .drop-zone img { max-height: 80px; border-radius: 8px; margin: 8px auto; display: block; }

    .btn-primary {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      border: none; border-radius: 8px; color: #fff;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Stats bar ── */
    .stats-bar {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 1px; background: var(--border);
      border-top: 1px solid var(--border);
    }
    .stat {
      background: var(--surface); padding: 10px;
      text-align: center;
    }
    .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center; z-index: 200;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; width: 90%; max-width: 400px;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: none; opacity:1; } }
    .modal h3 { font-size: 1rem; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn-secondary {
      flex: 1; padding: 9px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 0.83rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent); }

    /* ── Toast ── */
    #toast-container {
      position: fixed; bottom: 20px; right: 20px; z-index: 300;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 10px 16px; border-radius: 8px; font-size: 0.82rem; font-weight: 500;
      background: var(--surface); border: 1px solid var(--border);
      animation: slideIn 0.2s ease;
      box-shadow: var(--shadow);
    }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error   { border-color: var(--red);   color: var(--red); }
    @keyframes slideIn { from { transform: translateX(20px); opacity:0; } to { transform: none; opacity:1; } }

    /* Utility */
    .gap-2 { display: flex; flex-direction: column; gap: 8px; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- Header -->
  <header>
    <div class="logo">🤖</div>
    <h1>Face Recognition <span>AI</span></h1>
    <div class="badge offline" id="status-badge">
      <span class="dot"></span>
      <span id="status-text">Connecting…</span>
    </div>
  </header>

  <!-- Main -->
  <main>

    <!-- Video Feed -->
    <div class="video-panel" id="video-panel">
      <img id="video-stream" src="/video_feed" alt="Live camera stream"
           onerror="document.getElementById('video-no-cam').style.display='flex'; this.style.display='none';" />
      <div class="video-no-cam" id="video-no-cam" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.9L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
          <line x1="2" y1="2" x2="22" y2="22"/>
        </svg>
        <span>Camera không khả dụng</span>
      </div>
      <div class="video-overlay">
        <div class="video-chip">● LIVE</div>
        <div class="video-chip" id="fps-chip">— FPS</div>
        <div class="video-chip face-count-chip" id="face-chip">0 khuôn mặt</div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-live-btn" onclick="switchTab('live')">🎯 Nhận diện</button>
        <button class="tab-btn" id="tab-people-btn" onclick="switchTab('people')">👥 Người dùng</button>
        <button class="tab-btn" id="tab-add-btn" onclick="switchTab('add')">➕ Thêm mới</button>
      </div>

      <!-- Tab: Live Recognition -->
      <div class="tab-pane active" id="tab-live">
        <div id="faces-list">
          <div class="no-faces" id="no-faces-msg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 014-4h4a4 4 0 014 4v2"/>
            </svg>
            <span>Chưa phát hiện khuôn mặt</span>
          </div>
        </div>
      </div>

      <!-- Tab: People -->
      <div class="tab-pane" id="tab-people">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="🔍 Tìm theo tên, CCCD…" oninput="searchPersons(this.value)" />
        </div>
        <div class="gap-2" id="persons-list">
          <div style="text-align:center;color:var(--muted);padding:20px;">Đang tải…</div>
        </div>
      </div>

      <!-- Tab: Add Person -->
      <div class="tab-pane" id="tab-add">
        <form id="add-form" class="gap-2" onsubmit="submitAddPerson(event)">
          <div class="form-group">
            <label class="form-label">Họ và tên *</label>
            <input id="fn-name" class="form-input" type="text" placeholder="Nguyễn Văn A" required />
          </div>
          <div class="form-group">
            <label class="form-label">Ngày sinh</label>
            <input id="fn-dob" class="form-input" type="date" />
          </div>
          <div class="form-group">
            <label class="form-label">Số CCCD / CMND</label>
            <input id="fn-id" class="form-input" type="text" placeholder="0123456789" />
          </div>
          <div class="form-group">
            <label class="form-label">Giới tính</label>
            <select id="fn-gender" class="form-select">
              <option value="">— Chọn —</option>
              <option value="Nam">Nam</option>
              <option value="Nữ">Nữ</option>
              <option value="Khác">Khác</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Số điện thoại</label>
            <input id="fn-phone" class="form-input" type="tel" placeholder="0901234567" />
          </div>
          <div class="form-group">
            <label class="form-label">Ảnh khuôn mặt (để đăng ký nhận diện)</label>
            <div class="drop-zone" id="drop-zone">
              <input type="file" id="fn-photo" accept="image/*" capture="user" onchange="previewPhoto(event)" />
              <div id="drop-text">📷 Chọn ảnh hoặc chụp<br/><small style="color:var(--muted)">Hỗ trợ JPG, PNG, WEBP</small></div>
            </div>
          </div>
          <button type="submit" class="btn-primary" id="submit-btn">
            ✅ Đăng ký người dùng
          </button>
        </form>
      </div>

      <!-- Stats -->
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-val" id="stat-persons">—</div>
          <div class="stat-label">Người đăng ký</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="stat-faces">0</div>
          <div class="stat-label">Khuôn mặt</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="stat-fps">—</div>
          <div class="stat-label">FPS</div>
        </div>
      </div>

    </aside>
  </main>

</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="del-modal">
  <div class="modal">
    <h3>🗑️ Xác nhận xoá</h3>
    <p style="color:var(--muted);font-size:0.85rem;">Bạn có chắc muốn xoá người này? Hành động không thể hoàn tác.</p>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Huỷ</button>
      <button class="btn-primary" id="confirm-del-btn" style="background:var(--red);">Xoá</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
  const API = '';
  let pollInterval = null;
  let statusInterval = null;
  let pendingDeleteId = null;
  let currentTab = 'live';

  // ── Tab switching ──────────────────────────────────────────────
  function switchTab(name) {
    currentTab = name;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name + '-btn').classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'people') loadPersons();
  }

  // ── Toast ──────────────────────────────────────────────────────
  function showToast(msg, type='success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  // ── Status polling ─────────────────────────────────────────────
  async function pollStatus() {
    try {
      const r = await fetch(API + '/api/status');
      const d = await r.json();
      const badge = document.getElementById('status-badge');
      const txt   = document.getElementById('status-text');
      if (d.status === 'running') {
        badge.className = 'badge';
        txt.textContent = d.models_loaded ? 'Online' : 'No Model';
      }
      document.getElementById('stat-persons').textContent = d.total_persons;
      document.getElementById('stat-fps').textContent = d.fps + ' FPS';
    } catch(e) {
      document.getElementById('status-badge').className = 'badge offline';
      document.getElementById('status-text').textContent = 'Offline';
    }
  }

  // ── Recognition polling ────────────────────────────────────────
  async function pollRecognition() {
    if (currentTab !== 'live') return;
    try {
      const r = await fetch(API + '/api/recognize');
      const d = await r.json();
      renderFaces(d.faces || []);
      document.getElementById('fps-chip').textContent = (d.fps || 0).toFixed(1) + ' FPS';
      document.getElementById('stat-fps').textContent = (d.fps || 0).toFixed(1) + ' FPS';
      const n = (d.faces || []).length;
      document.getElementById('face-chip').textContent = n + ' khuôn mặt';
      document.getElementById('stat-faces').textContent = n;
    } catch(e) {}
  }

  function renderFaces(faces) {
    const list = document.getElementById('faces-list');
    const noMsg = document.getElementById('no-faces-msg');

    if (!faces.length) {
      noMsg.style.display = 'flex';
      // Remove old face cards
      list.querySelectorAll('.face-card').forEach(c => c.remove());
      return;
    }
    noMsg.style.display = 'none';

    // Update or create face cards keyed by track_id
    const existing = {};
    list.querySelectorAll('.face-card').forEach(c => {
      existing[c.dataset.tid] = c;
    });
    const seen = new Set();

    faces.forEach(f => {
      seen.add(String(f.track_id));
      let card = existing[f.track_id];
      if (!card) {
        card = document.createElement('div');
        card.className = 'face-card';
        card.dataset.tid = f.track_id;
        list.appendChild(card);
      }
      const sim = f.similarity ? (f.similarity * 100).toFixed(0) + '%' : '—';
      const livBadge = f.is_real
        ? '<span class="liveness-badge real">REAL</span>'
        : '<span class="liveness-badge fake">SPOOF</span>';
      const avatarSrc = f.person_id
        ? `${API}/api/persons/${f.person_id}/photo`
        : '';
      const avatarHtml = avatarSrc
        ? `<img src="${avatarSrc}" onerror="this.parentElement.textContent='😶'" />`
        : '😶';
      const simColor = f.similarity > 0.7 ? 'var(--green)' : f.similarity > 0.5 ? 'var(--orange)' : 'var(--muted)';

      card.innerHTML = `
        <div class="face-avatar">${avatarHtml}</div>
        <div class="face-info">
          <div class="face-name">${f.name || 'Unknown'}</div>
          <div class="face-meta">ID#${f.person_id || '—'} · Track#${f.track_id}</div>
          <div class="face-sim" style="color:${simColor}">Similarity: ${sim}</div>
        </div>
        ${livBadge}
      `;
    });

    // Remove stale cards
    Object.keys(existing).forEach(tid => {
      if (!seen.has(tid)) existing[tid].remove();
    });
  }

  // ── Load Persons ───────────────────────────────────────────────
  async function loadPersons(search='') {
    const list = document.getElementById('persons-list');
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;">Đang tải…</div>';
    try {
      const r = await fetch(API + '/api/persons?search=' + encodeURIComponent(search));
      const persons = await r.json();
      if (!persons.length) {
        list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;">Chưa có người nào được đăng ký.</div>';
        return;
      }
      list.innerHTML = '';
      persons.forEach(p => {
        const initials = (p.full_name || 'U').split(' ').map(w=>w[0]).slice(-2).join('').toUpperCase();
        const hasPhoto = !!p.photo_path;
        const avatarHtml = hasPhoto
          ? `<img src="${API}/api/persons/${p.id}/photo" onerror="this.parentElement.textContent='${initials}'" />`
          : initials;

        const el = document.createElement('div');
        el.className = 'person-item';
        el.innerHTML = `
          <div class="person-avatar">${avatarHtml}</div>
          <div class="person-info">
            <div class="person-name">${p.full_name}</div>
            <div class="person-sub">${p.id_number || 'Không có CCCD'} · ${p.gender || ''}</div>
          </div>
          <div class="person-actions">
            <button class="btn-icon del" title="Xoá" onclick="confirmDelete(${p.id})">🗑</button>
          </div>
        `;
        list.appendChild(el);
      });
      document.getElementById('stat-persons').textContent = persons.length;
    } catch(e) {
      list.innerHTML = '<div style="color:var(--red);padding:16px;">Lỗi tải danh sách.</div>';
    }
  }

  function searchPersons(val) {
    clearTimeout(searchPersons._t);
    searchPersons._t = setTimeout(() => loadPersons(val), 300);
  }

  // ── Delete ─────────────────────────────────────────────────────
  function confirmDelete(id) {
    pendingDeleteId = id;
    document.getElementById('del-modal').classList.add('open');
    document.getElementById('confirm-del-btn').onclick = async () => {
      await deletePerson(pendingDeleteId);
      closeModal();
    };
  }
  function closeModal() {
    document.getElementById('del-modal').classList.remove('open');
    pendingDeleteId = null;
  }
  async function deletePerson(id) {
    try {
      const r = await fetch(API + '/api/persons/' + id, { method: 'DELETE' });
      if (r.ok) { showToast('Đã xoá người dùng.'); loadPersons(); }
      else showToast('Xoá thất bại.', 'error');
    } catch(e) { showToast('Lỗi kết nối.', 'error'); }
  }

  // ── Photo preview ──────────────────────────────────────────────
  function previewPhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const dz = document.getElementById('drop-zone');
      const txt = document.getElementById('drop-text');
      txt.innerHTML = `<img src="${ev.target.result}" />` + txt.innerHTML.replace(/<img[^>]*>/,'');
      dz.style.borderColor = 'var(--accent)';
    };
    reader.readAsDataURL(file);
  }
  // Drag & drop
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f) { document.getElementById('fn-photo').files = e.dataTransfer.files; previewPhoto({target:{files:[f]}}); }
  });

  // ── Add Person Form ────────────────────────────────────────────
  async function submitAddPerson(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Đang xử lý…';

    const fd = new FormData();
    fd.append('full_name', document.getElementById('fn-name').value.trim());
    fd.append('dob',    document.getElementById('fn-dob').value || '');
    fd.append('id_number', document.getElementById('fn-id').value.trim());
    fd.append('gender', document.getElementById('fn-gender').value);
    fd.append('phone',  document.getElementById('fn-phone').value.trim());
    const photoFile = document.getElementById('fn-photo').files[0];
    if (photoFile) fd.append('photo', photoFile);

    try {
      const r = await fetch(API + '/api/persons', { method: 'POST', body: fd });
      const d = await r.json();
      if (r.ok) {
        showToast(`✅ Đã thêm! ID: ${d.person_id}, Embeddings: ${d.embeddings_registered}`);
        document.getElementById('add-form').reset();
        document.getElementById('drop-text').innerHTML = '📷 Chọn ảnh hoặc chụp<br/><small style="color:var(--muted)">Hỗ trợ JPG, PNG, WEBP</small>';
        document.getElementById('drop-zone').style.borderColor = '';
        document.querySelectorAll('#drop-zone img').forEach(i=>i.remove());
        pollStatus();
      } else {
        showToast(d.detail || 'Thêm thất bại.', 'error');
      }
    } catch(err) {
      showToast('Lỗi kết nối server.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '✅ Đăng ký người dùng';
    }
  }

  // ── Init ───────────────────────────────────────────────────────
  pollStatus();
  pollRecognition();
  statusInterval = setInterval(pollStatus, 5000);
  pollInterval   = setInterval(pollRecognition, 800);
</script>
</body>
</html>
