<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Recognition AI — Cloud Edge</title>
  <meta name="description" content="Nhận diện khuôn mặt Cloud AI qua WebSocket." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Reset & Base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235; --border: #1e2d45;
      --accent: #6366f1; --accent2: #22d3ee; --green: #10b981; --red: #ef4444;
      --orange: #f59e0b; --text: #e2e8f0; --muted: #64748b; --radius: 12px;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Layout */
    .app-shell { display: grid; grid-template-rows: 60px 1fr; grid-template-columns: 1fr; min-height: 100vh; }
    
    /* Header */
    header {
      display: flex; align-items: center; gap: 14px; padding: 0 24px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px);
    }
    .logo {
      width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
    header h1 span { color: var(--accent2); }

    .badge {
      display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 600; background: rgba(16,185,129,0.12); color: var(--green);
      border: 1px solid rgba(16,185,129,0.3);
    }
    .badge.offline { background: rgba(239,68,68,0.12); color: var(--red); border-color: rgba(239,68,68,0.3); }
    .badge.warning { background: rgba(245,158,11,0.12); color: var(--orange); border-color: rgba(245,158,11,0.3); }

    /* Main Grid */
    main { display: grid; grid-template-columns: 1fr 340px; grid-template-rows: 1fr auto; gap: 0; overflow: hidden; }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; grid-template-rows: auto auto auto; } }

    /* Video Panel */
    .video-panel { position: relative; background: #000; overflow: hidden; min-height: 400px; display: flex; align-items: center; justify-content: center; }
    #video-element { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    #overlay-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
    
    .video-overlay { position: absolute; top: 12px; left: 12px; display: flex; flex-direction: column; gap: 6px; z-index: 10; }
    .video-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 10px; font-size: 0.75rem; font-weight: 600; color: var(--text);
    }
    
    .start-camera-btn {
      position: absolute; z-index: 20; padding: 12px 24px; font-size: 1rem; font-weight: 600;
      background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer;
      box-shadow: 0 4px 12px rgba(99,102,241,0.4); transition: transform 0.2s;
    }
    .start-camera-btn:hover { transform: scale(1.05); }

    /* Sidebar */
    .sidebar { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); }
    .tab-btn {
      flex: 1; padding: 14px 8px; background: transparent; border: none;
      color: var(--muted); font-size: 0.8rem; font-weight: 500; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-pane { display: none; flex: 1; overflow-y: auto; padding: 16px; flex-direction: column; gap: 12px; }
    .tab-pane.active { display: flex; }

    /* Face Results */
    .face-card {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px; display: flex; align-items: center; gap: 12px;
    }
    .face-avatar {
      width: 48px; height: 48px; border-radius: 50%; background: var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; flex-shrink: 0;
    }
    .face-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .face-info { flex: 1; min-width: 0; }
    .face-name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .face-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    /* Stats bar */
    .stats-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
    .stat { background: var(--surface); padding: 10px; text-align: center; }
    .stat-val { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
    
    /* People Tab Elements (Simplified for brevity) */
    .btn-primary { width: 100%; padding: 10px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; }
    .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px;}
    .form-input { padding: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: white;}
    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 10px 16px; border-radius: 8px; background: var(--surface); border: 1px solid var(--green); color: var(--green); }
  </style>
</head>
<body>
<div class="app-shell">

  <header>
    <div class="logo">🤖</div>
    <h1>Face AI <span>Cloud</span></h1>
    <div class="badge offline" id="ws-badge">WebSocket Offline</div>
  </header>

  <main>
    <div class="video-panel" id="video-container">
      <video id="video-element" autoplay playsinline muted></video>
      <canvas id="overlay-canvas"></canvas>
      <button class="start-camera-btn" id="start-cam-btn" onclick="startCamera()">📷 Bật Camera</button>
      
      <div class="video-overlay" id="overlay-stats" style="display:none;">
        <div class="video-chip" style="color:var(--accent2)">🚀 <span id="ping-text">0ms</span> ping</div>
        <div class="video-chip" style="color:var(--green)">⚡ <span id="server-fps">0</span> Server FPS</div>
      </div>
    </div>

    <aside class="sidebar">
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-live-btn" onclick="switchTab('live')">🎯 Nhận diện</button>
        <button class="tab-btn" id="tab-add-btn" onclick="switchTab('add')">➕ Thêm mới</button>
      </div>

      <div class="tab-pane active" id="tab-live">
        <div id="faces-list" style="display:flex; flex-direction:column; gap:8px;">
          <div style="text-align:center;color:var(--muted);padding:30px;">Chưa phát hiện khuôn mặt</div>
        </div>
      </div>

      <div class="tab-pane" id="tab-add">
        <form id="add-form" onsubmit="submitAddPerson(event)">
          <div class="form-group">
            <label>Họ và tên *</label>
            <input id="fn-name" class="form-input" type="text" required />
          </div>
          <div class="form-group">
            <label>Ảnh khuôn mặt *</label>
            <input id="fn-photo" class="form-input" type="file" accept="image/*" required />
          </div>
          <button type="submit" class="btn-primary" id="submit-btn">✅ Đăng ký</button>
        </form>
      </div>

      <div class="stats-bar">
        <div class="stat"><div class="stat-val" id="stat-faces">0</div><div class="stat-label">Khuôn mặt</div></div>
        <div class="stat"><div class="stat-val" id="stat-cam-fps">0</div><div class="stat-label">Cam FPS</div></div>
        <div class="stat"><div class="stat-val" id="stat-process">0ms</div><div class="stat-label">Process</div></div>
      </div>
    </aside>
  </main>
</div>

<div id="toast-container"></div>

<script>
  const API_HTTP = window.location.origin;
  const API_WS = (window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host + '/ws/recognize';
  
  let video = document.getElementById('video-element');
  let canvas = document.getElementById('overlay-canvas');
  let ctx = canvas.getContext('2d');
  
  // Hidden canvas for extracting frames
  let hiddenCanvas = document.createElement('canvas');
  let hiddenCtx = hiddenCanvas.getContext('2d');
  
  let ws = null;
  let isStreaming = false;
  let framesSent = 0;
  let lastFpsTime = Date.now();
  
  let lastServerFpsTime = Date.now();
  let serverFramesProcessed = 0;

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name + '-btn').classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  function showToast(msg) {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    c.appendChild(t); setTimeout(() => t.remove(), 3000);
  }

  // ── 1. Khởi động Camera Local ──
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" } 
      });
      video.srcObject = stream;
      document.getElementById('start-cam-btn').style.display = 'none';
      document.getElementById('overlay-stats').style.display = 'flex';
      
      video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        hiddenCanvas.width = video.videoWidth;
        hiddenCanvas.height = video.videoHeight;
        isStreaming = true;
        connectWebSocket();
        requestAnimationFrame(sendFrameLoop);
      };
    } catch (err) {
      alert("Không thể mở Camera: " + err.message);
    }
  }

  // ── 2. Kết nối WebSocket tới Server ──
  function connectWebSocket() {
    ws = new WebSocket(API_WS);
    const badge = document.getElementById('ws-badge');
    
    ws.onopen = () => {
      badge.className = 'badge'; badge.textContent = 'Server Connected';
    };
    
    ws.onmessage = (event) => {
      // Nhận kết quả AI từ Server
      const result = JSON.parse(event.data);
      serverFramesProcessed++;
      
      if(result.faces) {
        drawBoundingBoxes(result.faces);
        updateFacesSidebar(result.faces);
      }
      if(result.process_time_ms) {
        document.getElementById('stat-process').textContent = result.process_time_ms + 'ms';
      }
      
      // Tính Server FPS
      let now = Date.now();
      if(now - lastServerFpsTime >= 1000) {
        document.getElementById('server-fps').textContent = serverFramesProcessed;
        serverFramesProcessed = 0;
        lastServerFpsTime = now;
      }
    };
    
    ws.onclose = () => {
      badge.className = 'badge offline'; badge.textContent = 'Disconnected';
      setTimeout(connectWebSocket, 3000); // Reconnect
    };
  }

  // ── 3. Gửi Frame liên tục qua WebSocket ──
  function sendFrameLoop() {
    if (!isStreaming) return;
    
    // Giới hạn tốc độ gửi (ví dụ 10-15 FPS) để không làm nghẽn Server
    setTimeout(() => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        // Vẽ video lên hidden canvas
        hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
        
        // Nén thành JPEG (quality 0.6) và chuyển thành Blob -> ArrayBuffer
        hiddenCanvas.toBlob((blob) => {
          if(blob) blob.arrayBuffer().then(buffer => ws.send(buffer));
        }, 'image/jpeg', 0.6);
        
        framesSent++;
        let now = Date.now();
        if(now - lastFpsTime >= 1000) {
          document.getElementById('stat-cam-fps').textContent = framesSent;
          framesSent = 0;
          lastFpsTime = now;
        }
      }
      requestAnimationFrame(sendFrameLoop);
    }, 100); // Gửi mỗi 100ms ~ 10 FPS
  }

  // ── 4. Vẽ khung đè lên Video ──
  function drawBoundingBoxes(faces) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Video display size vs intrinsic size mapping
    const rect = video.getBoundingClientRect();
    const scaleX = rect.width / video.videoWidth;
    const scaleY = rect.height / video.videoHeight;
    const offsetX = (canvas.parentElement.clientWidth - rect.width) / 2;
    const offsetY = (canvas.parentElement.clientHeight - rect.height) / 2;

    // Reset transform to match video styling
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    canvas.style.left = offsetX + 'px';
    canvas.style.top = offsetY + 'px';

    document.getElementById('stat-faces').textContent = faces.length;

    faces.forEach(f => {
      let [x1, y1, x2, y2] = f.bbox;
      let isReal = f.is_real;
      let name = f.person_id ? `${f.name} (${Math.round(f.similarity*100)}%)` : "Unknown";
      
      let color = isReal ? (f.person_id ? '#10b981' : '#f59e0b') : '#ef4444';
      if(!isReal) name += " [SPOOF]";

      // Vẽ Box
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
      
      // Vẽ Label background
      ctx.font = "14px Inter, sans-serif";
      let textWidth = ctx.measureText(name).width;
      ctx.fillStyle = color;
      ctx.fillRect(x1, y1 - 22, textWidth + 10, 22);
      
      // Vẽ Text
      ctx.fillStyle = "#ffffff";
      ctx.fillText(name, x1 + 5, y1 - 6);
    });
  }

  // ── Cập nhật danh sách bên Sidebar ──
  function updateFacesSidebar(faces) {
    const list = document.getElementById('faces-list');
    if (!faces.length) {
      list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:30px;">Chưa phát hiện khuôn mặt</div>';
      return;
    }
    
    let html = '';
    faces.forEach(f => {
      const avatarSrc = f.person_id ? `${API_HTTP}/api/persons/${f.person_id}/photo` : '';
      const avatar = avatarSrc ? `<img src="${avatarSrc}" onerror="this.style.display='none'">` : '😶';
      html += `
        <div class="face-card">
          <div class="face-avatar">${avatar}</div>
          <div class="face-info">
            <div class="face-name">${f.name}</div>
            <div class="face-meta">${f.is_real ? '✅ Real' : '❌ Spoof'} · ${f.similarity ? (f.similarity*100).toFixed(0)+'%' : 'N/A'}</div>
          </div>
        </div>
      `;
    });
    list.innerHTML = html;
  }

  // ── Đăng ký người mới qua REST API ──
  async function submitAddPerson(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Đang đăng ký...';

    const fd = new FormData();
    fd.append('full_name', document.getElementById('fn-name').value);
    fd.append('photo', document.getElementById('fn-photo').files[0]);

    try {
      const r = await fetch(API_HTTP + '/api/persons', { method: 'POST', body: fd });
      if (r.ok) {
        showToast("✅ Đăng ký thành công!");
        document.getElementById('add-form').reset();
      } else {
        const d = await r.json();
        alert("Lỗi: " + d.detail);
      }
    } catch(err) {
      alert("Lỗi kết nối API.");
    } finally {
      btn.disabled = false; btn.textContent = '✅ Đăng ký';
    }
  }

  // Fix canvas resize on window resize
  window.addEventListener('resize', () => {
    if(video.videoWidth) {
      const rect = video.getBoundingClientRect();
      const offsetX = (canvas.parentElement.clientWidth - rect.width) / 2;
      const offsetY = (canvas.parentElement.clientHeight - rect.height) / 2;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      canvas.style.left = offsetX + 'px';
      canvas.style.top = offsetY + 'px';
    }
  });
</script>
</body>
</html>
